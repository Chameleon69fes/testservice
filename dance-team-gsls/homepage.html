<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ダンスチーム TEST SERVICE</title>
  <style>
    body {
      background: #1a1a1a;
      color: #fff;
      font-family: 'Arial Black';
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #00ff00;
      text-shadow: 0 0 20px #00ff00;
    }
    a {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 40px;
      background: linear-gradient(45deg, #00ff00, #00ccff);
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      font-size: 18px;
    }
    a:hover {
      transform: scale(1.1);
      transition: 0.3s;
    }
  </style>
</head>
</html>
